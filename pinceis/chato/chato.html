<!DOCTYPE html>

	<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Lobster+Two:wght@400;700&display=swap" rel="stylesheet">

	<title>Emporio Janial</title>
	<style>
		* {
    			box-sizing: border-box;
		}

		.top-bar {
			background-color: #91592c;
			height: 32px;
			width: 100%;
    			color: #fff;
    			font-size: 14px;
			font-weight: bold;
			font-family: Arial;
    			padding-left: 80px;
			display: flex;
			align-items: center;
			justify-content: flex-start;
		}

		.logo-bar {
			background-color: #f9f3e5;
			height: 132px;
			width: 100%;
    			color: #fff;
    			align-items: center;
			padding-top: 0px;
		}

		img {
			height: 100px;
			width: auto;
			margin-top: 20px;
		}

		body {
			font-family: Lobster Two, cursive;
			font-size: 18px;
			font-weight: 400;
			text-align: center;
			background-color: #f7f7f7;
			margin: 0;
    			padding: 0;
		}

		.green-bar {
			background-color: #168545;
			height: 64px;
			width: 100%;
    			color: #fff;
			font-size: 32px;
			display: flex;
    			align-items: center;
			justify-content: center;
			padding: 20px 80px;
			line-height: 1.6; 
			text-align: left;
			font-family: Lobster, cursive;
		}

		.green-link {
		    color: #fff;
		    text-decoration: none;
		    font-family: Lobster, cursive;
		    font-size: 32px;
		}
	
		.green-link:hover {
		    text-decoration: underline;
		}

		.title {
			background-color: #2dcc70;
			color: #fff;
			position: relative;
			font-size: 28px;
   			padding: 20px 0;
			margin: 0;
			display: flex;
 			justify-content: center;
   			align-items: center;
		}

		.products-grid {
			width: 100%;
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 20px;
    			max-width: 900px;
   			margin: 10px auto;
			margin-top: 0px;
    			padding: 20px;
			box-sizing: border-box;
		}

		.products-grid img {
    			width: 100%;
    			height: auto;
    			border-radius: 8px;
    			object-fit: cover;
    			background-color: #eee;
		}

		.product {
    			text-align: center;
		}

		.item img {
    			width: 100%;
    			height: auto;
    			border-radius: 8px;
    			object-fit: cover;
		}
		
		.label {
    			margin-top: 8px;
    			font-size: 16px;
    			color: black;
    			font-weight: 600;
			font-family: Arial;
		}
		

	</style>
</head>
