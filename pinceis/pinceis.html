<!DOCTYPE html>
<html>
<head>
	<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Lobster+Two:wght@400;700&display=swap" rel="stylesheet">

	<title>Emporio Janial</title>
	<style>
		* {
    			box-sizing: border-box;
		}

		.top-bar {
			background-color: #91592c;
			height: 32px;
			width: 100%;
    			color: #fff;
    			font-size: 14px;
			font-weight: bold;
			font-family: Arial;
    			padding-left: 80px;
			display: flex;
			align-items: center;
			justify-content: flex-start;
		}

		.logo-bar {
			background-color: #f9f3e5;
			height: 132px;
			width: 100%;
    			color: #fff;
    			align-items: center;
			padding-top: 0px;
		}


		.green-bar {
			background-color: #168545;
			height: 64px;
			width: 100%;
    			color: #fff;
			font-size: 32px;
			display: flex;
    			align-items: center;
			justify-content: center;
			padding: 20px 80px;
			line-height: 1.6; 
			text-align: left;
			font-family: Lobster, cursive;
		}

		.title {
			background-color: #2dcc70;
			color: #fff;
			position: relative;
			font-size: 28px;
   			padding: 20px 0;
			margin: 0;
			display: flex;
 			justify-content: center;
   			align-items: center;
		}

		.category-bar {
			background-color: #f2ce3d;
			height: 128px;
			width: 100%;
    			color: #fff;
			font-size: 28px;
			display: flex;
			justify-content: space-around;
    			align-items: center;
			padding: 20px 80px;
			line-height: 1.6; 
			text-align: left;
			font-family: Lobster Two, cursive;
		}

		.category-item {
		    	color: #fff;
    			font-weight: 600;
    			text-decoration: none;
  			padding: 8px 12px;
    			border-radius: 6px;
    			transition: 0.2s;
		}

		img {
			height: 100px;
			width: auto;
			margin-top: 20px;
		}

		body {
			font-family: Lobster Two, cursive;
			font-size: 18px;
			font-weight: 400;
			text-align: center;
			background-color: #f7f7f7;
			margin: 0;
    			padding: 0;
		}

	</style>
</head>
<body>

	<div class="top-bar">
		Loja de Material para Artesanato - Atendimento WhatsApp: (19) 99804-6700
	</div>

	<div class="logo-bar">
		<a href="https://emporiojanial.com.br">
			<img src="/images/EJlogolado.png" alt="EJlogo">
		</a>
	</div>

	<div class="green-bar">
		Pincéis
	</div>

	<h1 class="title">
		Escolha a categoria
	</h1>

	<div class="category-bar">
		<a href="chato/" class="category-item">Chato</a>
    		<a href="chato-longo/" class="category-item">Chato Longo</a>
		<a href="lixado/" class="category-item">Lixado</a>
    		<a href="chanfrado/" class="category-item">Chanfrado</a>
    		<a href="redondo/" class="category-item">Redondo</a>
  		<a href="trincha/" class="category-item">Trincha</a>
	</div>

</body>
</html>
