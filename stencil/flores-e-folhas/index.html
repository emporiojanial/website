	<title>Emporio Janial</title>
	<style>
		* {
    			box-sizing: border-box;
		}

		.top-bar {
			background-color: #91592c;
			height: 32px;
			width: 100%;
    			color: #fff;
    			font-size: 14px;
			font-weight: bold;

    			padding-left: 80px;
			display: flex;
			align-items: center;
			justify-content: flex-start;
		}

		.logo-bar {
			background-color: #f9f3e5;
			height: 132px;
			width: 100%;
    			color: #fff;
    			align-items: center;
			padding-top: 0px;
		}

		img {
			height: 100px;
			width: auto;
			margin-top: 20px;
		}

		body {
			font-family: Lobster Two, cursive;
			font-size: 18px;
			font-weight: 400;
			text-align: center;
			background-color: #f7f7f7;
			margin: 0;
    			padding: 0;
		}

		.green-bar {
			background-color: #168545;
			height: 64px;
			width: 100%;
    			color: #fff;
			font-size: 32px;
			display: flex;
    			align-items: center;
			justify-content: center;
			padding: 20px 80px;
			line-height: 1.6; 
			text-align: left;
			font-family: Lobster, cursive;
		}

		.green-link {
		    color: #fff;
		    text-decoration: none;
		    font-family: Lobster, cursive;
		    font-size: 32px;
		}
	
		.green-link:hover {
		    text-decoration: underline;
		}

		.title {
			background-color: #2dcc70;
			color: #fff;
			position: relative;
			font-size: 28px;
   			padding: 20px 0;
			margin: 0;
			margin-bottom: 20px;
			display: flex;
 			justify-content: center;
   			align-items: center;
		}

		.size-bar {
			background-color: #fff;
			height: 60px;
			width: 100%;
    			color: #000;
			font-size: 24px;
			display: flex;
    			align-items: center;
			justify-content: center;
			padding: 20px 80px;
			line-height: 1.6; 
			text-align: left;
			font-family: Lobster, cursive;
		}

		.products-grid {
			width: 100%;
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 20px;
    			max-width: 900px;
   			margin: 10px auto;
			margin-top: 0px;
    			padding: 20px;
			box-sizing: border-box;
		}

		.products-grid img {
    			width: 100%;
    			height: auto;
    			border-radius: 8px;
    			object-fit: cover;
    			background-color: #eee;
		}

		.product {
    			text-align: center;
		}

		.item img {
    			width: 100%;
    			height: auto;
    			border-radius: 8px;
    			object-fit: cover;
		}
		
		.label {
    			margin-top: 8px;
    			font-size: 16px;
    			color: black;
    			font-weight: 600;
			font-family: Arial;
		}

		.back-to-top {
 		   	position: fixed;
    			bottom: 20px;
    			right: 20px;
    			width: 45px;
    			height: 45px;
    			background-color: #168545;
    			color: #fff;
    			border: none;
    			border-radius: 50%;
    			font-size: 22px;
    			font-weight: bold;
    			cursor: pointer;
    			box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    			display: flex;
    			align-items: center;
    			justify-content: center;
    			z-index: 9999;
    			transition: transform 0.2s ease, background-color 0.2s ease;
		}

		.back-to-top:hover {
    			background-color: #0f6a36;
    			transform: scale(1.1);
		}
		

	</style>
</head>


<button class="back-to-top" onclick="window.scrollTo({ top: 0, behavior: 'smooth' });">

</button>
